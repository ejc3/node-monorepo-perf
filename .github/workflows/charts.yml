name: charts

# Keeps every committed chart in sync with the bench data — the three heat charts
# (comparison-chart/scale-chart/net-cache-chart) plus chart.mjs's scaling charts and
# bench/summary.md — and keeps the high-resolution PNGs (linked from the docs) freshly
# rendered rather than hand-maintained.
#
# Each SVG (and summary.md) is a deterministic function of the cited bench/*.json, so it is
# byte-gated: change a bench dataset without re-rendering and CI fails. The PNG is a raster of that SVG whose exact bytes depend
# on the ImageMagick version, so it is NOT byte-gated across environments. Instead the job deletes the
# committed PNG and re-renders it (via scripts/comparison-chart.mjs, which writes the SVG and PNG
# together): if `convert` fails the PNG is absent and the validation step fails (a convert failure
# can't pass a stale PNG), and on a push to main the freshly-rendered PNG is committed back, so the
# committed raster always tracks the gated SVG instead of relying on a contributor to re-render it.

on:
  push:
    branches: [main]
    paths:
      - "bench/*.json"
      - "bench/charts/*.svg"
      - "bench/charts/*.png"
      - "bench/summary.md"
      - "README.md"
      - "scripts/chart.mjs"
      - "scripts/comparison-chart.mjs"
      - "scripts/scale-chart.mjs"
      - "scripts/net-cache-chart.mjs"
      - ".github/workflows/charts.yml"
  pull_request:
    paths:
      - "bench/*.json"
      - "bench/charts/*.svg"
      - "bench/charts/*.png"
      - "bench/summary.md"
      - "README.md"
      - "scripts/chart.mjs"
      - "scripts/comparison-chart.mjs"
      - "scripts/scale-chart.mjs"
      - "scripts/net-cache-chart.mjs"
      - ".github/workflows/charts.yml"

permissions:
  contents: write # the commit-refreshed-PNG step pushes to main (no-op on pull_request)

jobs:
  comparison-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ImageMagick + librsvg (SVG raster delegate)
        run: sudo apt-get update && sudo apt-get install -y imagemagick librsvg2-bin

      - name: Re-render the charts (delete the PNGs first so a convert failure can't pass a stale one)
        run: |
          rm -f bench/charts/tool-comparison.png bench/charts/checker-scale.png bench/charts/cache-network.png
          node scripts/comparison-chart.mjs
          node scripts/scale-chart.mjs
          node scripts/net-cache-chart.mjs
          # CHART_STRICT: in CI a doc-linked chart chart.mjs skips (confounded/short data)
          # must FAIL, not keep-and-warn — a kept stale SVG would pass the byte-gate below.
          CHART_STRICT=1 node scripts/chart.mjs

      - name: Fail if a committed SVG (or the summary) drifted from the bench data (or was never committed)
        run: |
          # intent-to-add so brand-new chart files are drift too — `git diff` alone
          # ignores untracked files, and a forgotten `git add` must fail this gate.
          # --ignore-removal keeps a generator-deleted (orphaned) chart OUT of the index —
          # a staged removal would be silently swept into the PNG commit-back below — and
          # diffing against HEAD (not the index) is what makes that deletion fail the gate.
          # Covers every committed SVG: the three heat charts plus chart.mjs's charts
          # (typecheck-cold-vs-warm, focus-vs-full, lockfile-vs-scale) and its summary.md.
          git add -N --ignore-removal -- bench/charts/ bench/summary.md
          if ! git diff --exit-code HEAD -- 'bench/charts/*.svg' bench/summary.md; then
            echo "::error::a committed chart SVG or bench/summary.md is out of date, missing, or orphaned. Run 'make chart comparison-chart scale-chart net-cache-chart' and commit the result."
            exit 1
          fi

      - name: Require freshly-rendered PNGs (absent => convert failed)
        run: |
          for png in bench/charts/tool-comparison.png bench/charts/checker-scale.png bench/charts/cache-network.png; do
            test -s "$png" || { echo "::error::convert did not produce $png"; exit 1; }
            dims=$(identify -format '%wx%h %m' "$png")
            echo "PNG: $png $dims"
            case "$dims" in
              *" PNG") ;;
              *) echo "::error::not a PNG: $png $dims"; exit 1 ;;
            esac
          done

      - name: Commit the refreshed PNG on main (keeps the committed raster in lockstep with the SVG)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --porcelain -- bench/charts/tool-comparison.png bench/charts/checker-scale.png bench/charts/cache-network.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bench/charts/tool-comparison.png bench/charts/checker-scale.png bench/charts/cache-network.png
            git commit -m "CI: re-render chart PNGs from the SVGs [skip ci]"
            # Best-effort: if main is branch-protected the push is rejected; warn rather than failing
            # the build (the PNG was still validated above; refresh it locally with make comparison-chart).
            git push || echo "::warning::could not push the refreshed PNG (branch protection?); run 'make comparison-chart' and commit it"
          fi

      - name: Upload the freshly-rendered PNGs (PR builds)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: chart-pngs
          path: |
            bench/charts/tool-comparison.png
            bench/charts/checker-scale.png
            bench/charts/cache-network.png
          if-no-files-found: error
