<svg xmlns="http://www.w3.org/2000/svg" width="1214" height="348" viewBox="0 0 1214 348" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
<rect width="1214" height="348" fill="#ffffff"/>
<text x="28" y="42" font-size="20" font-weight="700" fill="#1f2328">Remote cache restore: the network cost the localhost floor hides</text>
<text x="28" y="70" font-size="13" fill="#57606a">A shared Turborepo cache beats cold compute on every link tested; only the 247 MB build cache carries a network cost, and it stays a few seconds — largest cross-region.</text>
<text x="28" y="98" font-size="11" fill="#57606a">Cell: restore time · ×N vs the row's fastest. Cold compute carries no cache — the red baseline every restore beats.</text>
<rect x="28" y="128" width="250" height="52" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="42" y="159" font-size="12" font-weight="600" fill="#57606a">task (fresh CI runner)</text>
<rect x="278" y="128" width="150" height="52" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="353" y="150" font-size="14" font-weight="700" fill="#1f2328" text-anchor="middle">cold compute</text>
<text x="353" y="167" font-size="10" fill="#57606a" text-anchor="middle">no shared cache</text>
<rect x="428" y="128" width="150" height="52" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="503" y="150" font-size="14" font-weight="700" fill="#1f2328" text-anchor="middle">localhost</text>
<text x="503" y="167" font-size="10" fill="#57606a" text-anchor="middle">floor · no network</text>
<rect x="578" y="128" width="150" height="52" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="653" y="150" font-size="14" font-weight="700" fill="#1f2328" text-anchor="middle">same-region</text>
<text x="653" y="167" font-size="10" fill="#57606a" text-anchor="middle">1 Gbps · 2 ms</text>
<rect x="728" y="128" width="150" height="52" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="803" y="150" font-size="14" font-weight="700" fill="#1f2328" text-anchor="middle">cross-region</text>
<text x="803" y="167" font-size="10" fill="#57606a" text-anchor="middle">500 Mbps · 30 ms</text>
<rect x="28" y="180" width="250" height="60" fill="#ffffff" stroke="#d0d7de"/>
<text x="42" y="207" font-size="15" font-weight="600" fill="#1f2328">typecheck</text>
<text x="42" y="226" font-size="11" fill="#57606a">0.2 MB cache · 500 tasks</text>
<rect x="278" y="180" width="150" height="60" fill="rgb(197,94,29)" stroke="#ffffff"/>
<text x="353" y="208" font-size="17" font-weight="700" fill="#0a0d12" text-anchor="middle">23s</text>
<text x="353" y="226" font-size="12" font-weight="600" fill="#0a0d12" text-anchor="middle">×12</text>
<rect x="428" y="180" width="150" height="60" fill="rgb(31,128,54)" stroke="#ffffff"/>
<text x="503" y="208" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">2.0s</text>
<text x="503" y="226" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">×1.0</text>
<rect x="578" y="180" width="150" height="60" fill="rgb(26,127,55)" stroke="#ffffff"/>
<text x="653" y="208" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">2.0s</text>
<text x="653" y="226" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">fastest</text>
<rect x="728" y="180" width="150" height="60" fill="rgb(29,128,55)" stroke="#ffffff"/>
<text x="803" y="208" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">2.0s</text>
<text x="803" y="226" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">×1.0</text>
<rect x="28" y="240" width="250" height="60" fill="#ffffff" stroke="#d0d7de"/>
<text x="42" y="267" font-size="15" font-weight="600" fill="#1f2328">build</text>
<text x="42" y="286" font-size="11" fill="#57606a">247 MB cache · 400 tasks</text>
<rect x="278" y="240" width="150" height="60" fill="rgb(193,85,31)" stroke="#ffffff"/>
<text x="353" y="268" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">60s</text>
<text x="353" y="286" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">×17</text>
<rect x="428" y="240" width="150" height="60" fill="rgb(26,127,55)" stroke="#ffffff"/>
<text x="503" y="268" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">3.5s</text>
<text x="503" y="286" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">fastest</text>
<rect x="578" y="240" width="150" height="60" fill="rgb(53,133,51)" stroke="#ffffff"/>
<text x="653" y="268" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">3.9s</text>
<text x="653" y="286" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">×1.1</text>
<rect x="728" y="240" width="150" height="60" fill="rgb(164,157,35)" stroke="#ffffff"/>
<text x="803" y="268" font-size="17" font-weight="700" fill="#0a0d12" text-anchor="middle">5.8s</text>
<text x="803" y="286" font-size="12" font-weight="600" fill="#0a0d12" text-anchor="middle">×1.7</text>
<text x="28" y="326" font-size="11" fill="#57606a">Source: bench/ci-cache-network-bench.json — turbo 2.9.18, 300:100, restore = median of 3, 64 cores. RTT = 2×netem delay; restores asserted all-cached-from-remote.</text>
</svg>